syntax = "proto3";

package notifier.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/thomas-maurice/matrix-notifier/gen/notifier/v1;notifierv1";

// AdminService manages channels, ingest tokens, and exposes bot health.
// All RPCs require the admin bearer token.
service AdminService {
  // Login exchanges the admin password for a JWT (7 days validity). The only
  // RPC that does not require authentication. The token is also set as an
  // httpOnly cookie for browser sessions.
  rpc Login(LoginRequest) returns (LoginResponse) {}
  // Logout clears the browser session cookie. Bearer tokens stay valid until
  // they expire (JWTs are stateless); rotate the password to revoke them all.
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
  // ChangeAdminPassword rotates the admin password AND the JWT signing
  // secret, invalidating every outstanding session. The response carries a
  // fresh token (and cookie) so the calling session stays logged in.
  rpc ChangeAdminPassword(ChangeAdminPasswordRequest) returns (ChangeAdminPasswordResponse) {}

  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {}

  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse) {}
  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse) {}
  // LeaveRoom makes the bot leave (and forget) a room. Refused while a
  // channel still maps to it.
  rpc LeaveRoom(LeaveRoomRequest) returns (LeaveRoomResponse) {}
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse) {}
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse) {}
  rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse) {}

  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse) {}
  rpc CreateToken(CreateTokenRequest) returns (CreateTokenResponse) {}
  rpc UpdateToken(UpdateTokenRequest) returns (UpdateTokenResponse) {}
  rpc DeleteToken(DeleteTokenRequest) returns (DeleteTokenResponse) {}

  // ListDeliveries returns the delivery history (queue + terminal states),
  // newest first, optionally filtered by channel.
  rpc ListDeliveries(ListDeliveriesRequest) returns (ListDeliveriesResponse) {}
  // RetryDelivery re-queues a FAILED delivery for immediate sending.
  // Delivered entries cannot be retried (that would duplicate them).
  rpc RetryDelivery(RetryDeliveryRequest) returns (RetryDeliveryResponse) {}

  rpc SendTestNotification(SendTestNotificationRequest) returns (SendTestNotificationResponse) {}
  // TestToken sends a test notification through a token, applying its prefix
  // so the operator can see exactly what a producer's messages look like.
  rpc TestToken(TestTokenRequest) returns (TestTokenResponse) {}

  // GetProfile returns the bot account's Matrix profile; the avatar is
  // inlined as bytes (profile pictures are small) so the browser can
  // preview it without an authenticated media download.
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse) {}
  // SetProfile updates the parts of the profile that are set: a non-empty
  // display_name renames the bot, non-empty avatar bytes replace its
  // picture. Both are visible in every room the bot is in.
  rpc SetProfile(SetProfileRequest) returns (SetProfileResponse) {}
}

message Channel {
  string name = 1;
  string room_id = 2;
  google.protobuf.Timestamp created_at = 3;
  // Live Matrix state: whether the bot has joined the room and whether the
  // room is encrypted. A channel is only deliverable when both are true.
  bool joined = 4;
  bool encrypted = 5;
  // Attach a rendered Prometheus chart to alertmanager notifications.
  bool chart = 6;
  // Canonical alias of the room (#foo:server), empty if none is set.
  string alias = 7;
}

message Token {
  string name = 1;
  // any | gotify | alertmanager
  string kind = 2;
  string channel = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp last_used_at = 5;
  // Prepended to notification titles (e.g. an emoji per producer).
  string prefix = 6;
}

// Room is a room the bot has joined, whether or not a channel maps to it.
message Room {
  string room_id = 1;
  string name = 2;
  // Name of the channel bound to this room, empty if unmapped.
  string channel = 3;
  bool encrypted = 4;
  // MXID of the other member when the room is a direct message (nameless,
  // two members) — e.g. the DM a client creates for user verification.
  string dm_with = 5;
}

message ListRoomsRequest {}

message ListRoomsResponse {
  repeated Room rooms = 1;
}

message LeaveRoomRequest {
  string room_id = 1;
}

message LeaveRoomResponse {}

message LoginRequest {
  string password = 1;
}

message LoginResponse {
  // JWT to present as "Authorization: Bearer <token>".
  string token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message LogoutRequest {}

message LogoutResponse {}

message ChangeAdminPasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message ChangeAdminPasswordResponse {
  // Fresh JWT signed with the rotated secret; all previous tokens are dead.
  string token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  string user_id = 1;
  string device_id = 2;
  bool verified = 3;
  // Sync is considered healthy when the last sync is recent.
  google.protobuf.Timestamp last_sync = 4;
  int64 delivered_since_start = 5;
  int64 uptime_seconds = 6;
  string version = 7;
  string database_type = 8;
}

message ListChannelsRequest {}

message ListChannelsResponse {
  repeated Channel channels = 1;
}

message CreateChannelRequest {
  string name = 1;
  string room_id = 2;
  bool chart = 3;
}

message CreateChannelResponse {
  Channel channel = 1;
}

message UpdateChannelRequest {
  string name = 1;
  // Toggle chart attachment for alertmanager notifications.
  bool chart = 2;
}

message UpdateChannelResponse {
  Channel channel = 1;
}

message DeleteChannelRequest {
  string name = 1;
}

message DeleteChannelResponse {}

message ListTokensRequest {}

message ListTokensResponse {
  repeated Token tokens = 1;
}

message CreateTokenRequest {
  string name = 1;
  string kind = 2;
  string channel = 3;
  string prefix = 4;
}

message CreateTokenResponse {
  Token token = 1;
  // The plaintext token, returned exactly once. Only its hash is stored.
  string plaintext = 2;
}

message UpdateTokenRequest {
  string name = 1;
  string prefix = 2;
  // Reassign the token to another channel (and room). Empty leaves it
  // unchanged.
  string channel = 3;
}

message UpdateTokenResponse {
  Token token = 1;
}

message DeleteTokenRequest {
  string name = 1;
}

message DeleteTokenResponse {}

// Delivery is one notification's trip through the outbox: pending entries
// are still being retried, delivered/failed are history.
message Delivery {
  int64 id = 1;
  google.protobuf.Timestamp created_at = 2;
  string channel = 3;
  string kind = 4;
  string title = 5;
  string body = 6;
  int32 priority = 7;
  // pending | delivered | failed
  string status = 8;
  int32 attempts = 9;
  // Last send error, empty once delivered.
  string last_error = 10;
  google.protobuf.Timestamp delivered_at = 11;
}

message ListDeliveriesRequest {
  // Filter by channel name; empty returns all channels.
  string channel = 1;
  // Maximum entries to return; 0 means the server default (100), capped at 500.
  int32 limit = 2;
}

message ListDeliveriesResponse {
  repeated Delivery deliveries = 1;
}

message RetryDeliveryRequest {
  int64 id = 1;
}

message RetryDeliveryResponse {}

message SendTestNotificationRequest {
  string channel = 1;
}

message SendTestNotificationResponse {}

message TestTokenRequest {
  string name = 1;
}

message TestTokenResponse {}

message GetProfileRequest {}

message GetProfileResponse {
  string display_name = 1;
  // Raw image bytes and their MIME type; empty when no avatar is set.
  bytes avatar = 2;
  string avatar_mime = 3;
}

message SetProfileRequest {
  string display_name = 1;
  bytes avatar = 2;
}

message SetProfileResponse {}
