listen: ":8686"
log_level: "debug"
data_dir: "./data"

matrix:
  homeserver: "http://localhost:8008"
  user_id: "@notifier:localhost"
  password: "notifier-dev-password"

database:
  type: "postgres"
  uri: "postgres://synapse:synapse@localhost:5432/notifier?sslmode=disable"

# Dev admin token is "dev-admin-token" (hash generated by bootstrap.sh).
admin_token_hash: "@ADMIN_TOKEN_HASH@"

prometheus_url: "http://localhost:9090"
